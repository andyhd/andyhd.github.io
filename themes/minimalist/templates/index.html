{% extends "base.html" %}

{% block content %}
  <h2>Posts</h2>
  {% for article in articles %}
    <article>
      <h3><a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a></h3>
      <time datetime="{{ article.date }}">{{ article.friendly_date }}</time>
    </article>
  {% endfor %}
{% endblock %}
